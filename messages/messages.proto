syntax = "proto3";

package christiangeorgelucas.musicxml_tools;

// A raw MusicXML document as caller-supplied text — either the
// score-partwise or score-timewise root form. Text only: never a URL, file
// path, or compressed .mxl (zip) container — this package accepts only the
// already-uncompressed XML text.
message MusicXmlInput {
  string xml = 1;
}

// A MusicXmlInput scoped to one part (from ListParts' PartInfo.id), with an
// optional inclusive 0-based measure-index range to bound output on very
// large scores. part_id empty means "every part"; end_measure_index 0 means
// "unbounded" (start_measure_index is still honored).
message MusicXmlPartQuery {
  string xml = 1;
  string part_id = 2;
  int32 start_measure_index = 3;
  int32 end_measure_index = 4;
}

// Whether a text is MusicXML at all, and which of the two interchangeable
// root forms it uses.
message DetectResult {
  bool is_music_xml = 1;
  // "score-partwise" | "score-timewise" | "" (not recognized as either).
  string form = 2;
  // The root element's version attribute, e.g. "4.0". Empty if absent.
  string musicxml_version = 3;
  string error = 4;
}

// One <creator> entry from <identification>, e.g. type="composer".
message Creator {
  string type = 1;
  string name = 2;
}

// Work and identification metadata: <work>, <movement-title>,
// <identification>/<creator>/<rights>/<encoding>.
message ScoreMetadata {
  string work_title = 1;
  string work_number = 2;
  string movement_title = 3;
  string movement_number = 4;
  repeated Creator creators = 5;
  // <rights> text, e.g. copyright notice.
  string rights = 6;
  // Every <encoding-software> value found under <identification>/<encoding>.
  repeated string encoding_software = 7;
  // Every <encoding-date> value (kept as the raw ISO date text).
  repeated string encoding_dates = 8;
  string source = 9;
  string error = 10;
}

// One <score-part> entry from <part-list>: a part's identity, independent
// of whether it has any measures.
message PartInfo {
  string id = 1;
  string name = 2;
  string abbreviation = 3;
  int32 instrument_count = 4;
}

message ListPartsResult {
  repeated PartInfo parts = 1;
  int32 part_count = 2;
  string error = 3;
}

// One part in the normalized whole-score structure returned by ParseScore.
message ParsedPart {
  string id = 1;
  string name = 2;
  int32 measure_count = 3;
}

// A score-partwise/score-timewise document normalized into one common
// shape regardless of which of the two root forms it was written in.
message ParsedScore {
  string form = 1;
  string title = 2;
  // The first <creator type="composer">; falls back to the first creator
  // of any type if no "composer"-typed creator exists, else "".
  string composer = 3;
  repeated ParsedPart parts = 4;
  string error = 5;
}

// One measure within one part.
message MeasureInfo {
  string part_id = 1;
  // 0-based position of this measure within its part (NOT the same as
  // measure "number" below, which is caller-facing text and not
  // guaranteed to be sequential integers — pickup measures are often "0").
  int32 index = 2;
  string number = 3;
  bool implicit = 4;
  double width = 5;
  bool width_specified = 6;
  int32 note_count = 7;
  int32 rest_count = 8;
  // True when this measure contains an <attributes> element (a time,
  // key, clef, or divisions change may start here).
  bool has_attributes = 9;
}

message ExtractMeasuresResult {
  repeated MeasureInfo measures = 1;
  int32 total_measures = 2;
  // True when more measures existed than the node's output cap allowed.
  bool truncated = 3;
  string error = 4;
}

// A note's pitch, absent for rests and unpitched notes.
message NotePitch {
  // "A".."G".
  string step = 1;
  // Semitone alteration (e.g. 1 = sharp, -1 = flat); 0 when unaltered.
  int32 alter = 2;
  bool alter_specified = 3;
  int32 octave = 4;
}

// One <note> element.
message NoteInfo {
  string part_id = 1;
  int32 measure_index = 2;
  string measure_number = 3;
  bool is_rest = 4;
  // True for an unpitched note (<unpitched/>, e.g. percussion); pitch is
  // unset in that case too.
  bool is_unpitched = 5;
  NotePitch pitch = 6;
  // Duration in the part's current <divisions> units (quarter-note
  // subdivisions) at this point in the score.
  int32 duration = 7;
  // Note type, e.g. "quarter", "eighth", "16th". May be empty (some
  // MusicXML writers omit it for a note whose duration alone is enough).
  string type = 8;
  int32 dots = 9;
  string voice = 10;
  int32 staff = 11;
  bool staff_specified = 12;
  bool tie_start = 13;
  bool tie_stop = 14;
  // True when a <chord/> element is present: this note sounds together
  // with the immediately preceding note rather than after it.
  bool chord = 15;
  bool grace = 16;
}

message ExtractNotesResult {
  repeated NoteInfo notes = 1;
  int32 total_notes = 2;
  bool truncated = 3;
  string error = 4;
}

// A time signature as it reads at the point it changes.
message TimeSignatureChange {
  string part_id = 1;
  int32 measure_index = 2;
  string measure_number = 3;
  // Numerator(s) — almost always one value; MusicXML allows multiple
  // <beats>/<beat-type> pairs for additive/complex meters (e.g. 3+2/8).
  repeated string beats = 4;
  repeated string beat_type = 5;
  // "common" | "cut" | "single-number" | "normal" | "" (attribute absent).
  string symbol = 6;
}

message ExtractTimeSignaturesResult {
  repeated TimeSignatureChange changes = 1;
  string error = 2;
}

// A key signature as it reads at the point it changes.
message KeySignatureChange {
  string part_id = 1;
  int32 measure_index = 2;
  string measure_number = 3;
  // Number of sharps (positive) or flats (negative) — the circle-of-fifths
  // position, per the MusicXML <fifths> element. 0 = C major / A minor.
  int32 fifths = 4;
  // <mode> text, e.g. "major", "minor", "dorian". Empty if absent.
  string mode = 5;
  // Derived tonic name, e.g. fifths=2 -> "D major" (mode defaults to
  // "major" when absent and fifths is set). Empty when fifths could not
  // be read from a standard <key><fifths> signature (e.g. a non-standard
  // <key> using only <key-step>/<key-alter> pairs).
  string key_name = 6;
}

message ExtractKeySignaturesResult {
  repeated KeySignatureChange changes = 1;
  string error = 2;
}

// A clef as it reads at the point it changes.
message ClefChange {
  string part_id = 1;
  int32 measure_index = 2;
  string measure_number = 3;
  // "G" | "F" | "C" | "percussion" | "TAB" | "jianpu" | "none", etc.
  string sign = 4;
  int32 line = 5;
  bool line_specified = 6;
  int32 octave_change = 7;
  bool octave_change_specified = 8;
  // Staff number this clef applies to, for multi-staff parts (e.g. piano
  // grand staff); 0 when the <clef> element carries no number attribute.
  int32 staff_number = 9;
}

message ExtractClefsResult {
  repeated ClefChange clefs = 1;
  string error = 2;
}

// A tempo marking from either a playback <sound tempo="..."> attribute or
// a human-readable <metronome> mark (a score may carry either, both, or
// neither at a given point).
message TempoMarking {
  string part_id = 1;
  int32 measure_index = 2;
  string measure_number = 3;
  double bpm = 4;
  bool bpm_specified = 5;
  // <beat-unit> text, e.g. "quarter". Empty if no metronome mark here.
  string beat_unit = 6;
  int32 beat_unit_dots = 7;
  // True when the metronome mark was given as beat_unit = beat_unit_2
  // (e.g. dotted-quarter = quarter) rather than beat_unit = a numeric bpm.
  bool metric_modulation = 8;
  string beat_unit_2 = 9;
}

message ExtractTempoResult {
  repeated TempoMarking tempos = 1;
  string error = 2;
}

// One syllable of sung text aligned to a note.
message LyricSyllable {
  string part_id = 1;
  int32 measure_index = 2;
  string measure_number = 3;
  // 0-based position of the owning note among ALL <note> elements
  // (including rests) in this measure, for aligning a syllable back to
  // ExtractNotes' output from the same call.
  int32 note_index_in_measure = 4;
  // <lyric number="..."> — which verse/stanza this syllable belongs to.
  // Empty when the attribute is absent (implicitly verse 1).
  string verse_number = 5;
  // "single" | "begin" | "middle" | "end" | "" (absent).
  string syllabic = 6;
  string text = 7;
  // True when a following <extend/> continues the syllable over later notes.
  bool extend = 8;
}

message ExtractLyricsResult {
  repeated LyricSyllable syllables = 1;
  string error = 2;
}

// Per-part measure/note/rest counts — a summary across the whole score in
// one call, without walking every note yourself.
message PartSummary {
  string part_id = 1;
  string part_name = 2;
  int32 measure_count = 3;
  int32 note_count = 4;
  int32 rest_count = 5;
}

message SummarizePartsResult {
  repeated PartSummary parts = 1;
  string error = 2;
}

// One <score-instrument> declared under a <score-part>. A part can declare
// more than one instrument (e.g. a multi-voice percussion part), so this
// is distinct from — and finer-grained than — PartInfo/ListParts.
message InstrumentInfo {
  string part_id = 1;
  string instrument_id = 2;
  string name = 3;
  string abbreviation = 4;
  // <instrument-sound> text if present under the score-instrument, or
  // (for a percussion instrument) the containing <instrument-sound>
  // equivalent from <midi-instrument>. Empty if not declared.
  string sound = 5;
}

message ExtractInstrumentsResult {
  repeated InstrumentInfo instruments = 1;
  int32 part_count = 2;
  int32 instrument_count = 3;
  string error = 4;
}

// One part's total notated duration, computed by walking <note>/<forward>/
// <backup> in document order per measure and taking, for each measure, the
// furthest cursor position any voice reached (this is what makes the
// computation correct for multi-voice parts, where <backup> rewinds the
// cursor so a second voice can be written after the first) — then summing
// that per-measure length across the part.
message PartDuration {
  string part_id = 1;
  // Sum, in the part's own <divisions> units, which can change mid-part
  // (division_changed flags that here).
  int32 total_duration_divisions = 2;
  // The LAST <divisions> value seen in the part; 0 if never specified.
  int32 last_divisions_per_quarter = 3;
  bool divisions_known = 4;
  // total_duration_divisions / last_divisions_per_quarter when
  // divisions_known and constant throughout the part; 0 otherwise.
  double total_quarter_notes = 5;
  bool total_quarter_notes_reliable = 6;
  bool divisions_changed_mid_part = 7;
}

message ComputeDurationResult {
  repeated PartDuration parts = 1;
  string error = 2;
}

// One dynamics marking, e.g. <direction-type><dynamics><mf/>.
message DynamicMarking {
  string part_id = 1;
  int32 measure_index = 2;
  string measure_number = 3;
  // The dynamics child element's tag name, e.g. "mf", "ff", "sfz"; for
  // <other-dynamics>, its text content instead.
  string dynamic_type = 4;
}

// One articulation/technical marking attached to a note's <notations>.
message ArticulationMarking {
  string part_id = 1;
  int32 measure_index = 2;
  string measure_number = 3;
  int32 note_index_in_measure = 4;
  // The marking element's tag name, e.g. "staccato", "accent", "tenuto",
  // "strong-accent", from <notations>/<articulations> or
  // <notations>/<technical>.
  string articulation_type = 5;
}

message ExtractDynamicsArticulationsResult {
  repeated DynamicMarking dynamics = 1;
  repeated ArticulationMarking articulations = 2;
  string error = 3;
}

// A part's transposition (written pitch vs. concert/sounding pitch), from
// <attributes>/<transpose>. Absent entirely for a non-transposing part
// (e.g. piano, violin) — such a part has no entries here at all.
message TranspositionInfo {
  string part_id = 1;
  int32 measure_index = 2;
  string measure_number = 3;
  int32 diatonic = 4;
  bool diatonic_specified = 5;
  int32 chromatic = 6;
  int32 octave_change = 7;
  bool octave_change_specified = 8;
  // <double/> present: sounds one octave lower/higher than written on top
  // of the diatonic/chromatic transposition (e.g. guitar notated at pitch
  // but sounding an octave down).
  bool double_transposition = 9;
}

message ExtractTranspositionResult {
  repeated TranspositionInfo transpositions = 1;
  string error = 2;
}

// A basic structural problem found by ValidateStructure.
message StructuralIssue {
  // "error" | "warning".
  string severity = 1;
  string message = 2;
}

// Basic structural correctness: a recognized score-partwise/score-timewise
// root exists, and <part-list>'s declared score-parts match the actual
// <part>/<measure> elements one-for-one. This is a structural check only —
// it does not validate against the full MusicXML schema/DTD.
message ValidateStructureResult {
  // True only when issues contains no "error"-severity entry (warnings do
  // not affect validity).
  bool valid = 1;
  string form = 2;
  repeated StructuralIssue issues = 3;
  int32 part_count = 4;
  int32 declared_part_count = 5;
  string error = 6;
}
